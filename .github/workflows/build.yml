name: Build
on:
    - push
    - pull_request
permissions:
    pull-requests: write
jobs:
    build:
        name: Build (${{ matrix.mc_version }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                mc_version: [1.21.11]
        steps:
            -   uses: actions/checkout@v5
                name: Checkout repository
                with:
                    fetch-tags: true
                    fetch-depth: 0
                    filter: 'tree:0'
            -   uses: ./.github/composite/gradle
            -   name: Build with gradle
                run: |
                    rm -f build/libs/Firnauhi-*.jar
                    ./gradlew assemble --scan "-Pmc_version=${{ matrix.mc_version }}"
            -   name: Move build artifact around and print check sum
                run: |
                    rm -f build/libs/*sources*.jar build/libs/*-api.jar
                    sha256sum build/libs/*.jar
            -   name: Upload build artifact
                uses: actions/upload-artifact@v4
                with:
                    name: built-mod-jar-${{ matrix.mc_version }}
                    path: build/libs/Firnauhi-*.jar
                    exclude: |
                        build/libs/*-sources.jar
                        build/libs/*-api.jar
    test:
        name: Test (${{ matrix.mc_version }})
        needs: build
        runs-on: ubuntu-latest
        strategy:
            matrix:
                mc_version: [1.21.11]
        steps:
            -   uses: actions/checkout@v4
                name: Checkout repository
                with:
                    fetch-tags: true
                    fetch-depth: 0
                    filter: 'tree:0'
            -   uses: ./.github/composite/gradle
            -   name: Build with gradle
                run: |
                    ./gradlew test --scan "-Pmc_version=${{ matrix.mc_version }}"
    prepare-release:
        name: Prepare a release
        runs-on: ubuntu-22.04
        needs: build
        permissions:
            contents: write
        if: ${{ 'push' == github.event_name && startsWith(github.ref, 'refs/tags/') }}
        steps:
            -   uses: actions/checkout@v5
                name: Checkout repository
                with:
                    fetch-tags: true
                    fetch-depth: 0
                    filter: 'tree:0'
            -   name: Download generated artifact (1.21.11)
                uses: actions/download-artifact@v5
                with:
                    name: built-mod-jar-1.21.11
                    path: jars/
            -   name: Generate changelog
                run: ./docs/generate-changelog.sh > changelog.md
            -   name: Upload release
                env:
                    GH_TOKEN: ${{ github.token }}
                run: |
                    gh release create --draft -t "Firnauhi ${GITHUB_REF#refs/tags/}" "${GITHUB_REF#refs/tags/}" -F "changelog.md" jars/*.jar
